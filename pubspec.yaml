name: zapret_ui
description: "UI for zapret-discord-youtube"
publish_to: 'none'
version: 0.1.0+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # === Network ===
  http: ^1.6.0

  # === Files System ===
  path: ^1.9.1
  archive: ^4.0.9
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5

  # === Utilities ===
  get_it: ^9.2.1
  logging: ^1.3.0
  injectable: ^3.0.0
  window_manager: ^0.5.1

  # # === Plugins ===
  # process_monitor:
  #   path: plugins/process_monitor

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # === Code generation ===
  build_runner: ^2.11.1
  injectable_generator: ^3.0.2


flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/bin/
    - assets/bin/zapret_ui_service.bat


  fonts:
    - family: CustomIcons
      fonts:
        - asset: assets/fonts/CustomIcons.ttf