name: zapret_ui
description: "UI for zapret-discord-youtube"
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # === Network ===
  http: ^1.6.0

  # === Utilities ===
  path: ^1.9.1
  archive: ^4.0.9
  window_manager: ^0.5.1
  shared_preferences: ^2.5.5
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/bin/

  fonts:
    - family: CustomIcons
      fonts:
        - asset: assets/fonts/CustomIcons.ttf